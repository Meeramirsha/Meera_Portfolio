<section class="contact section" id="contact">
    <div class="container">
        <div class="section-header reveal">
            <h2 class="section-title">Let's <span class="gradient-text">Connect</span></h2>
            <div class="section-line"></div>
        </div>

        <div class="contact-details-wrap reveal">
            <!-- Contact Info -->
            <div class="contact-info-cards">
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="info-details">
                        <h4>Email</h4>
                        <a [href]="'mailto:' + contactInfo.email">{{ contactInfo.email }}</a>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="info-details">
                        <h4>Phone</h4>
                        <a [href]="'tel:' + contactInfo.phone.replace(' ', '')">{{ contactInfo.phone }}</a>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="info-details">
                        <h4>Location</h4>
                        <p>{{ contactInfo.location }}</p>
                    </div>
                </div>

                <div class="social-connect">
                    <h4>Let's Network</h4>
                    <div class="social-links">
                        <a href="https://github.com/Meeramirsha" target="_blank" class="social-btn" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/meera-s-1b2350250" target="_blank" class="social-btn" title="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
