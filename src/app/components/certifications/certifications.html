<section class="certifications section" id="certifications">
    <div class="container">
        <div class="section-header reveal">
            <h2 class="section-title">Certifications & <span class="gradient-text">Badges</span></h2>
            <div class="section-line"></div>
        </div>

        <div class="certifications-grid">
            @for (cert of certifications; track cert.title) {
            <div class="cert-card reveal" [style.--cert-color]="cert.iconColor">
                <div class="cert-icon">
                    <i [class]="cert.icon"></i>
                </div>
                <div class="cert-info">
                    <h3 class="cert-title">{{ cert.title }}</h3>
                    <p class="cert-issuer">{{ cert.issuer }}</p>
                    <p class="cert-date">{{ cert.date }}</p>
                    
                    <ul class="cert-description">
                        @for (line of cert.description; track line) {
                        <li>{{ line }}</li>
                        }
                    </ul>
                </div>
                <div class="cert-view">
                    <a [href]="cert.link" target="_blank" class="btn-text">
                        View Certificate <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
            }
        </div>
    </div>
</section>
